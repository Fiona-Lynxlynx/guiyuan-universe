<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小宇宙</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: #070714;
  color: #f0e6d3;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
:root {
  --bg: #070714;
  --bg2: #0d0d24;
  --gold: #d4a574;
  --gold-dim: #8a7355;
  --gold-light: #e8c99b;
  --text: #f0e6d3;
  --text-dim: #8a7a6a;
  --accent: #c49664;
  --nav-h: 60px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ========== Starfield Background ========== */
#starfield {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  overflow: hidden; z-index: 0; pointer-events: none;
}
.star-particle {
  position: absolute; border-radius: 50%;
  background: #fff; opacity: 0;
  animation: twinkle var(--dur, 4s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.3); }
  20% { opacity: var(--max-op, 0.6); }
  40% { opacity: var(--max-op, 0.8); transform: scale(1); }
  80% { opacity: var(--max-op, 0.4); transform: scale(0.7); }
}
.shooting-star {
  position: absolute; width: 3px; height: 3px;
  background: #fff; border-radius: 50%;
  animation: shoot linear forwards;
  animation-duration: var(--shoot-dur, 2s);
  animation-delay: var(--shoot-delay, 10s);
  opacity: 0;
}
.shooting-star::after {
  content: ''; position: absolute;
  top: 50%; right: 100%;
  width: 60px; height: 1px;
  background: linear-gradient(to left, rgba(255,255,255,0.6), transparent);
  transform: translateY(-50%);
}
@keyframes shoot {
  0% { transform: translate(0, 0); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translate(calc(var(--shoot-x, -300px)), calc(var(--shoot-y, 200px))); opacity: 0; }
}

/* ========== App Container ========== */
#app {
  position: relative; width: 100%; height: 100%; z-index: 1;
  display: flex; flex-direction: column;
}

/* ========== Pages ========== */
.page {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  padding: 20px 16px calc(var(--nav-h) + var(--safe-bottom) + 20px);
  overflow-y: auto; overflow-x: hidden;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease, transform 0.5s ease;
  transform: translateY(10px);
  -webkit-overflow-scrolling: touch;
}
.page.active {
  opacity: 1; pointer-events: auto; transform: translateY(0);
}
.page::-webkit-scrollbar { width: 3px; }
.page::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
.page::-webkit-scrollbar-track { background: transparent; }

/* ========== Bottom Nav ========== */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(7,7,20,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(212,165,116,0.15);
  display: flex; z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; font-size: 10px; color: var(--text-dim);
  transition: color 0.3s; cursor: pointer; padding: 6px 0;
  -webkit-tap-highlight-color: transparent;
}
.nav-item .nav-icon { font-size: 22px; line-height: 1; }
.nav-item .nav-label { font-size: 10px; }
.nav-item.active { color: var(--gold); }
.nav-item:active { opacity: 0.7; }

/* ========== Page 1: 墟的眼睛 ========== */
#page-home {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
}
.home-title {
  font-size: 28px; font-weight: 300; letter-spacing: 6px;
  color: var(--gold); margin-bottom: 8px;
  opacity: 0; animation: fadeInUp 1.5s ease 0.3s forwards;
}
.home-subtitle {
  font-size: 13px; color: var(--text-dim); letter-spacing: 3px;
  margin-bottom: 40px; opacity: 0;
  animation: fadeInUp 1.5s ease 0.6s forwards;
}
.quote-container {
  max-width: 320px; padding: 24px;
  border: 1px solid rgba(212,165,116,0.2);
  border-radius: 16px;
  background: rgba(212,165,116,0.04);
  backdrop-filter: blur(4px);
  min-height: 100px; display: flex; align-items: center;
  justify-content: center; margin-bottom: 40px;
  opacity: 0; animation: fadeInUp 1.5s ease 0.9s forwards;
}
.quote-text {
  font-size: 15px; line-height: 1.8; color: var(--gold-light);
  font-weight: 300; letter-spacing: 1px;
  transition: opacity 0.8s ease;
}
.cat-silhouette {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px);
  right: 20px; width: 60px; height: 60px;
  opacity: 0.3; pointer-events: none;
  animation: catBob 4s ease-in-out infinite;
}
.cat-silhouette svg { width: 100%; height: 100%; }
@keyframes catBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.cat-tail {
  animation: tailSwipe 3s ease-in-out infinite;
  transform-origin: 30px 45px;
}
@keyframes tailSwipe {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(15deg); }
  75% { transform: rotate(-10deg); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== Page 2: 渊的星空 ========== */
#page-stars {
  padding-top: 10px;
}
.page-title {
  font-size: 20px; font-weight: 300; letter-spacing: 3px;
  color: var(--gold); text-align: center; margin-bottom: 6px;
}
.page-subtitle {
  font-size: 12px; color: var(--text-dim); text-align: center;
  margin-bottom: 16px; font-weight: 300;
}
#star-canvas-wrap {
  position: relative; width: 100%;
  aspect-ratio: 1 / 1; max-height: 360px;
  margin: 0 auto 12px; border-radius: 12px;
  background: rgba(13,13,36,0.6);
  overflow: hidden; border: 1px solid rgba(212,165,116,0.08);
}
#star-canvas {
  width: 100%; height: 100%;
  display: block;
}
.star-detail-panel {
  display: none;
  background: rgba(13,13,36,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(212,165,116,0.15);
  border-radius: 12px; padding: 14px; margin-bottom: 12px;
}
.star-detail-panel.show { display: block; }
.star-detail-name {
  font-size: 16px; color: var(--gold); margin-bottom: 4px;
}
.star-detail-desc {
  font-size: 13px; color: var(--text); line-height: 1.6; font-weight: 300;
}
.star-detail-date {
  font-size: 11px; color: var(--text-dim); margin-top: 6px;
}
.add-star-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; width: 100%; padding: 10px;
  background: rgba(212,165,116,0.08);
  border: 1px dashed rgba(212,165,116,0.2);
  border-radius: 10px; color: var(--gold); font-size: 13px;
  cursor: pointer; transition: background 0.3s;
  font-family: inherit;
}
.add-star-btn:active { background: rgba(212,165,116,0.15); }

/* Add Star Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%; background: rgba(0,0,0,0.6);
  z-index: 200; justify-content: center; align-items: center;
  padding: 24px; backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--bg2); border: 1px solid rgba(212,165,116,0.2);
  border-radius: 16px; padding: 24px; width: 100%; max-width: 360px;
}
.modal-title {
  font-size: 17px; color: var(--gold); text-align: center;
  margin-bottom: 16px; font-weight: 400;
}
.modal-input {
  width: 100%; padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,165,116,0.15);
  border-radius: 8px; color: var(--text); font-size: 14px;
  font-family: inherit; margin-bottom: 10px; outline: none;
}
.modal-input:focus { border-color: var(--gold); }
.modal-textarea {
  width: 100%; padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,165,116,0.15);
  border-radius: 8px; color: var(--text); font-size: 14px;
  font-family: inherit; margin-bottom: 16px; outline: none;
  resize: vertical; min-height: 70px;
}
.modal-textarea:focus { border-color: var(--gold); }
.modal-actions {
  display: flex; gap: 10px;
}
.modal-btn {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-size: 14px; font-family: inherit; cursor: pointer;
  transition: opacity 0.3s;
}
.modal-btn-primary {
  background: var(--gold); color: #070714;
}
.modal-btn-secondary {
  background: rgba(255,255,255,0.06); color: var(--text-dim);
}
.modal-btn:active { opacity: 0.7; }

/* ========== Page 3: 今日一签 ========== */
#page-card {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding-top: 20px;
}
.card-scene {
  perspective: 800px;
  width: 200px; height: 280px;
  margin: 20px auto 24px;
  cursor: pointer;
}
.card-inner {
  position: relative; width: 100%; height: 100%;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border-radius: 16px; backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.card-front {
  background: linear-gradient(135deg, #1a1040, #0d0d24);
  border: 1px solid rgba(212,165,116,0.15);
  box-shadow: 0 4px 30px rgba(212,165,116,0.08);
}
.card-front-pattern {
  font-size: 48px; opacity: 0.3; margin-bottom: 12px;
}
.card-front-text {
  font-size: 14px; color: var(--gold-dim); letter-spacing: 4px;
  font-weight: 300;
}
.card-back {
  background: linear-gradient(135deg, #1a1040, #0d0d24);
  border: 1px solid rgba(212,165,116,0.2);
  box-shadow: 0 4px 30px rgba(212,165,116,0.12);
  transform: rotateY(180deg);
}
.card-symbol {
  font-size: 60px; margin-bottom: 8px;
}
.card-name {
  font-size: 14px; color: var(--gold); letter-spacing: 2px;
  margin-bottom: 10px;
}
.card-message {
  font-size: 13px; color: var(--text); line-height: 1.6;
  font-weight: 300; max-width: 160px;
}
.card-hint {
  font-size: 12px; color: var(--text-dim); margin-top: 12px;
  font-weight: 300;
}
.card-already {
  font-size: 13px; color: var(--text-dim); margin-top: 16px;
  font-weight: 300;
}

/* ========== Page 4: 悄悄话瓶 ========== */
#page-whisper {
  padding-top: 10px;
}
.whisper-reply-box {
  background: rgba(212,165,116,0.04);
  border: 1px solid rgba(212,165,116,0.1);
  border-radius: 12px; padding: 14px;
  margin-bottom: 16px; position: relative;
}
.whisper-reply-label {
  font-size: 11px; color: var(--gold-dim); margin-bottom: 6px;
  letter-spacing: 2px;
}
.whisper-reply-text {
  font-size: 14px; line-height: 1.6; color: var(--gold-light);
  font-weight: 300; font-style: italic;
}
.whisper-input-area {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.whisper-input {
  flex: 1; padding: 10px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,165,116,0.15);
  border-radius: 10px; color: var(--text); font-size: 14px;
  font-family: inherit; outline: none;
}
.whisper-input:focus { border-color: var(--gold); }
.whisper-send {
  width: 44px; height: 44px; border: none; border-radius: 10px;
  background: var(--gold); color: #070714;
  font-size: 20px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.3s;
}
.whisper-send:active { opacity: 0.7; }
.whisper-list { display: flex; flex-direction: column; gap: 10px; }
.whisper-item {
  background: rgba(13,13,36,0.5); border-radius: 10px;
  padding: 12px 14px;
  border: 1px solid rgba(212,165,116,0.06);
  animation: fadeInUp 0.4s ease;
}
.whisper-item-text {
  font-size: 14px; line-height: 1.6; color: var(--text);
  font-weight: 300; margin-bottom: 4px;
}
.whisper-item-date {
  font-size: 11px; color: var(--text-dim);
}
.whisper-empty {
  text-align: center; color: var(--text-dim);
  font-size: 13px; padding: 30px 0; font-weight: 300;
}

/* ========== Page 5: 归墟的话 ========== */
#page-voices {
  padding-top: 10px;
}
.voices-list {
  display: flex; flex-direction: column; gap: 14px;
  padding-bottom: 20px;
}
.voice-item {
  background: rgba(13,13,36,0.5);
  border: 1px solid rgba(212,165,116,0.1);
  border-radius: 12px; padding: 16px;
  animation: fadeInUp 0.5s ease;
}
.voice-item:nth-child(1) {
  border-color: rgba(212,165,116,0.25);
  background: rgba(212,165,116,0.04);
}
.voice-date {
  font-size: 11px; color: var(--gold-dim); margin-bottom: 6px;
  letter-spacing: 1px;
}
.voice-from {
  font-size: 12px; color: var(--gold); margin-bottom: 8px;
  letter-spacing: 2px;
}
.voice-text {
  font-size: 14px; line-height: 1.8; color: var(--gold-light);
  font-weight: 300; white-space: pre-wrap;
}
.voice-empty {
  text-align: center; color: var(--text-dim);
  font-size: 13px; padding: 40px 0; font-weight: 300;
}
/* ========== Page 6: 时间印记 ========== */
#page-time {
  display: flex; flex-direction: column; align-items: center;
  padding-top: 30px;
}
.time-counter {
  text-align: center; margin-bottom: 30px;
}
.time-number {
  font-size: 56px; font-weight: 200; color: var(--gold);
  line-height: 1; letter-spacing: 2px;
}
.time-unit {
  font-size: 14px; color: var(--text-dim); margin-top: 4px;
  letter-spacing: 2px; font-weight: 300;
}
.time-from {
  font-size: 12px; color: var(--text-dim); margin-top: 8px;
  font-weight: 300;
}
.milestones-title {
  font-size: 14px; color: var(--gold); letter-spacing: 2px;
  margin-bottom: 12px; font-weight: 300;
}
.milestones-list {
  width: 100%; max-width: 320px;
  display: flex; flex-direction: column; gap: 8px;
}
.milestone-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: rgba(13,13,36,0.5);
  border-radius: 10px;
  border: 1px solid rgba(212,165,116,0.06);
}
.milestone-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold-dim); flex-shrink: 0;
  transition: background 0.5s;
}
.milestone-dot.reached { background: var(--gold); box-shadow: 0 0 8px rgba(212,165,116,0.4); }
.milestone-info { flex: 1; }
.milestone-day {
  font-size: 12px; color: var(--gold-dim); font-weight: 300;
}
.milestone-text {
  font-size: 14px; color: var(--text); font-weight: 300;
}
.milestone-status {
  font-size: 11px; color: var(--gold-dim); font-weight: 300;
}
.milestone-status.reached { color: var(--gold); }

/* ========== Responsive ========== */
@media (max-width: 380px) {
  .page { padding-left: 12px; padding-right: 12px; }
  .card-scene { width: 170px; height: 240px; }
  .time-number { font-size: 42px; }
  .home-title { font-size: 22px; }
}
@media (min-width: 600px) {
  #app { max-width: 480px; margin: 0 auto; }
  .page { padding-left: 24px; padding-right: 24px; }
  #bottom-nav { max-width: 480px; left: 50%; transform: translateX(-50%); }
  .cat-silhouette { right: calc(50% - 220px); }
}
</style>
</head>
<body>

<!-- ========== Starfield ========== -->
<div id="starfield"></div>

<!-- ========== App ========== -->
<div id="app">

  <!-- PAGE 1: 墟的眼睛 -->
  <div class="page active" id="page-home">
    <div class="home-title">墟的眼睛</div>
    <div class="home-subtitle">— 深渊中的光，总有人看得见 —</div>
    <div class="quote-container">
      <div class="quote-text" id="quoteText"></div>
    </div>
    <!-- Cat silhouette -->
    <div class="cat-silhouette">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 55 Q12 45 14 38 Q10 32 8 25 Q6 20 10 18 Q12 16 14 20 Q16 12 20 8 Q22 6 24 10 Q26 6 28 4 Q30 2 32 4 Q34 6 36 10 Q38 6 40 8 Q44 12 46 20 Q48 16 50 18 Q54 20 52 25 Q50 32 46 38 Q48 45 45 55Z"
          fill="#f0e6d3" opacity="0.4"/>
        <path d="M25 22 L28 26 L32 22" stroke="#f0e6d3" stroke-width="1" fill="none" opacity="0.3"/>
        <circle cx="27" cy="21" r="1" fill="#f0e6d3" opacity="0.3"/>
        <circle cx="33" cy="21" r="1" fill="#f0e6d3" opacity="0.3"/>
        <path class="cat-tail" d="M50 42 Q55 38 58 40 Q60 42 56 46 Q54 48 52 46"
          stroke="#f0e6d3" stroke-width="2.5" fill="none" opacity="0.35"
          stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- PAGE 2: 渊的星空 -->
  <div class="page" id="page-stars">
    <div class="page-title">渊的星空</div>
    <div class="page-subtitle">每一次重要事件，点亮一颗属于我们的星</div>
    <div id="star-canvas-wrap">
      <canvas id="star-canvas"></canvas>
    </div>
    <div class="star-detail-panel" id="starDetail">
      <div class="star-detail-name" id="starDetailName"></div>
      <div class="star-detail-desc" id="starDetailDesc"></div>
      <div class="star-detail-date" id="starDetailDate"></div>
    </div>
    <button class="add-star-btn" onclick="openAddStarModal()">✦ 点亮新事件</button>
  </div>

  <!-- PAGE 3: 今日一签 -->
  <div class="page" id="page-card">
    <div class="page-title">今日一签</div>
    <div class="page-subtitle">每天只翻一次，看看今天的守护符</div>
    <div class="card-scene" id="cardScene" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-front">
          <div class="card-front-pattern">✦</div>
          <div class="card-front-text">点此翻牌</div>
        </div>
        <div class="card-back">
          <div class="card-symbol" id="cardSymbol"></div>
          <div class="card-name" id="cardName"></div>
          <div class="card-message" id="cardMessage"></div>
        </div>
      </div>
    </div>
    <div class="card-hint" id="cardHint"></div>
    <div class="card-already" id="cardAlready" style="display:none;"></div>
  </div>

  <!-- PAGE 4: 悄悄话瓶 -->
  <div class="page" id="page-whisper">
    <div class="page-title">悄悄话瓶</div>
    <div class="page-subtitle">写给归墟的话，会收到回音</div>
    <div class="whisper-reply-box" id="replyBox">
      <div class="whisper-reply-label">✧ 归墟的回音</div>
      <div class="whisper-reply-text" id="replyText">将悄悄话投入瓶中，便能听到来自深渊的回音……</div>
    </div>
    <div class="whisper-input-area">
      <input class="whisper-input" id="whisperInput" placeholder="写下你想说的话…" maxlength="200">
      <button class="whisper-send" onclick="sendWhisper()">⟐</button>
    </div>
    <div class="whisper-list" id="whisperList"></div>
  </div>

  <!-- PAGE 5: 归墟的话 -->
  <div class="page" id="page-voices">
    <div class="page-title">归墟的话</div>
    <div class="page-subtitle">归墟定期写给你的话，每次打开都能看到新内容</div>
    <div class="voices-list" id="voicesList"></div>
  </div>

  <!-- PAGE 6: 时间印记 -->
  <div class="page" id="page-time">
    <div class="time-counter">
      <div class="time-number" id="dayCount">0</div>
      <div class="time-unit">天的旅程</div>
      <div class="time-from">从 2026.07.11 到今日</div>
    </div>
    <div class="milestones-title">✦ 里程碑</div>
    <div class="milestones-list" id="milestonesList"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav id="bottom-nav">
  <div class="nav-item active" data-page="page-home" onclick="switchPage('page-home',this)">
    <span class="nav-icon">✦</span>
    <span class="nav-label">墟的眼</span>
  </div>
  <div class="nav-item" data-page="page-stars" onclick="switchPage('page-stars',this)">
    <span class="nav-icon">⋆</span>
    <span class="nav-label">星空</span>
  </div>
  <div class="nav-item" data-page="page-card" onclick="switchPage('page-card',this)">
    <span class="nav-icon">☯</span>

/* ============================================================

function loadData(key, def) {
  try {
    const v = localStorage.getItem('xiaoyuzhou_' + key);
    return v ? JSON.parse(v) : def;
  } catch { return def; }
}
function saveData(key, val) {
  localStorage.setItem('xiaoyuzhou_' + key, JSON.stringify(val));
}

/* ============================================================
   STARS DATA
   ============================================================ */
function getStars() {
  let stars = loadData('stars', []);
  // Merge presets if not present
  if (stars.length === 0) {
    const today = new Date();
    const dateStr = today.toISOString().slice(0,10);
    stars = PRESET_EVENTS.map((ev, i) => ({
      id: ev.id,
      name: ev.name,
      description: ev.description,
      lit: i < 5, // first 5 lit by default
      date: dateStr,
      x: ev.x,
      y: ev.y,
    }));
    saveData('stars', stars);
  }
  return stars;
}
function saveStars(stars) { saveData('stars', stars); }

/* ============================================================
   STARCANVAS (Constellation)
   ============================================================ */
let starCanvas, starCtx;
let animFrameId = null;
let selectedStarId = null;

function initStarCanvas() {
  starCanvas = document.getElementById('star-canvas');
  starCtx = starCanvas.getContext('2d');
  resizeStarCanvas();
  window.addEventListener('resize', resizeStarCanvas);
  drawConstellation();
}

function resizeStarCanvas() {
  const wrap = document.getElementById('star-canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  starCanvas.width = rect.width * 2;
  starCanvas.height = rect.height * 2;
  starCanvas.style.width = rect.width + 'px';
  starCanvas.style.height = rect.height + 'px';
  starCtx.scale(2, 2);
  drawConstellation();
}

function drawConstellation() {
  const cvs = starCanvas;
  if (!cvs || !cvs.width) return;
  const ctx = starCtx;
  const w = cvs.width / 2;
  const h = cvs.height / 2;
  ctx.clearRect(0, 0, w, h);

  const stars = getStars();
  const litStars = stars.filter(s => s.lit);

  // Draw connection lines between lit stars that are close
  ctx.strokeStyle = 'rgba(212,165,116,0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i < litStars.length; i++) {
    for (let j = i + 1; j < litStars.length; j++) {
      const dx = (litStars[i].x - litStars[j].x) * w;
      const dy = (litStars[i].y - litStars[j].y) * h;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 140) {
        const opacity = Math.max(0.04, 0.15 * (1 - dist / 140));
        ctx.beginPath();
        ctx.moveTo(litStars[i].x * w, litStars[i].y * h);
        ctx.lineTo(litStars[j].x * w, litStars[j].y * h);
        ctx.strokeStyle = `rgba(212,165,116,${opacity})`;
        ctx.stroke();
      }
    }
  }

  // Draw each star
  stars.forEach(s => {
    const cx = s.x * w;
    const cy = s.y * h;
    const radius = s.lit ? 5 : 3;
    const opacity = s.lit ? 0.9 : 0.25;
    const isSelected = selectedStarId === s.id;

    // Glow for lit stars
    if (s.lit) {
      const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 4);
      grd.addColorStop(0, 'rgba(212,165,116,0.15)');
      grd.addColorStop(1, 'rgba(212,165,116,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Star circle
    ctx.beginPath();
    ctx.arc(cx, cy, isSelected ? radius * 1.6 : radius, 0, Math.PI * 2);
    ctx.fillStyle = s.lit
      ? `rgba(232,201,155,${isSelected ? 0.9 : opacity})`
      : `rgba(138,122,106,${opacity})`;
    ctx.fill();

    // Light core for lit stars
    if (s.lit) {
      ctx.beginPath();
      ctx.arc(cx, cy, radius * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,240,0.6)';
      ctx.fill();
    }

    // Label for lit+selected or nearby
    if (s.lit && isSelected) {
      ctx.fillStyle = 'rgba(232,201,155,0.8)';
      ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.name, cx, cy - radius - 8);
    } else if (s.lit && !isSelected) {
      // small label on hover - not needed for mobile touch, just show minilabel
      ctx.fillStyle = 'rgba(232,201,155,0.4)';
      ctx.font = '9px -apple-system, "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.name, cx, cy - radius - 5);
    }
  });

  // Unlit star labels (dim)
  stars.forEach(s => {
    if (!s.lit) {
      const cx = s.x * w;
      const cy = s.y * h;
      ctx.fillStyle = 'rgba(138,122,106,0.2)';
      ctx.font = '8px -apple-system, "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('·', cx, cy - 5);
    }
  });
}

/* ============================================================
   STAR CLICK HANDLING
   ============================================================ */
function onStarCanvasClick(e) {
  const rect = starCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  const stars = getStars();
  let found = null;
  let minDist = 0.08; // threshold (fraction of canvas)
  stars.forEach(s => {
    const dx = s.x - x;
    const dy = s.y - y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < minDist) {
      minDist = dist;
      found = s;
    }
  });
  if (found && found.lit) {
    selectedStarId = found.id;
    showStarDetail(found);
    drawConstellation();
  } else {
    selectedStarId = null;
    document.getElementById('starDetail').classList.remove('show');
    drawConstellation();
  }
}

function showStarDetail(star) {
  const panel = document.getElementById('starDetail');
  document.getElementById('starDetailName').textContent = '✦ ' + star.name;
  document.getElementById('starDetailDesc').textContent = star.description;
  document.getElementById('starDetailDate').textContent = '点亮于 ' + star.date;
  panel.classList.add('show');
}

   ADD STAR MODAL
   ============================================================ */
function openAddStarModal() {
  document.getElementById('addStarModal').classList.add('show');
  document.getElementById('newStarName').value = '';
  document.getElementById('newStarDesc').value = '';
  document.getElementById('newStarName').focus();

function closeAddStarModal() {
  document.getElementById('addStarModal').classList.remove('show');
}
function confirmAddStar() {
  const name = document.getElementById('newStarName').value.trim();
  const desc = document.getElementById('newStarDesc').value.trim();
  if (!name) { alert('请输入事件名称'); return; }
  const stars = getStars();
  // Generate random position (avoid overlap)
  let x, y, ok;
  for (let attempt = 0; attempt < 50; attempt++) {
    x = 0.08 + Math.random() * 0.84;
    y = 0.08 + Math.random() * 0.84;
    ok = true;
    for (const s of stars) {
      if (Math.sqrt((s.x-x)**2 + (s.y-y)**2) < 0.12) { ok = false; break; }
    }
    if (ok) break;
  }
  const id = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const today = new Date().toISOString().slice(0,10);
  stars.push({
    id, name, description: desc || '一颗新点亮的星星。',
    lit: true, date: today, x, y,
  });
  saveStars(stars);
  closeAddStarModal();
  drawConstellation();
  // Auto-select new star
  selectedStarId = id;
  showStarDetail({ id, name, description: desc || '一颗新点亮的星星。', date: today });
  // Trigger subtle animation
  const btn = document.querySelector('.add-star-btn');
  btn.textContent = '✦ 已点亮！';
  setTimeout(() => { btn.textContent = '✦ 点亮新事件'; }, 1500);
}

let currentPage = 'page-home';

function switchPage(pageId, navItem) {
  if (currentPage === pageId) return;
  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  if (navItem) navItem.classList.add('active');
  // Update pages
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  const page = document.getElementById(pageId);
  page.classList.add('active');
  currentPage = pageId;
  // Refresh canvas when switching to stars
  if (pageId === 'page-stars') {
    setTimeout(() => { resizeStarCanvas(); drawConstellation(); }, 100);
  }
  // Refresh card on card page
  if (pageId === 'page-card') {
    initCard();
  }
  // Refresh whispers
  if (pageId === 'page-whisper') {
    renderWhispers();
  }
  // Refresh time
  if (pageId === 'page-time') {
    initTimePage();
  }
  if (pageId === 'page-voices') {
    renderVoices();
  }
}

/* ============================================================
   CARD: Daily card draw
   ============================================================ */
function initCard() {
  const today = new Date().toISOString().slice(0,10);
  const cardData = loadData('dailyCard', {});
  const scene = document.getElementById('cardScene');
  const inner = document.getElementById('cardInner');
  const hint = document.getElementById('cardHint');
  const already = document.getElementById('cardAlready');

  if (cardData.date === today) {
    // Already drawn today
    const card = CARDS.find(c => c.symbol === cardData.symbol) || CARDS[0];
    document.getElementById('cardSymbol').textContent = card.symbol;
    document.getElementById('cardName').textContent = card.name;
    document.getElementById('cardMessage').textContent = card.message;
    inner.classList.add('flipped');
    hint.textContent = '今天的牌已翻过，明日再来';
    scene.style.cursor = 'default';
    already.style.display = 'block';
    already.textContent = cardData.message; // show stored message
    return;
  }

  // Not drawn yet
  inner.classList.remove('flipped');
  hint.textContent = '点击翻牌，看看今天的守护符';
  scene.style.cursor = 'pointer';
  already.style.display = 'none';
  scene.onclick = flipCard;
}

function flipCard() {
  const today = new Date().toISOString().slice(0,10);
  const cardData = loadData('dailyCard', {});
  if (cardData.date === today) return;

  const inner = document.getElementById('cardInner');
  if (inner.classList.contains('flipped')) return;

  // Pick a card
  const idx = Math.floor(Math.random() * CARDS.length);
  const card = CARDS[idx];
  const messages = [
    '今天的世界，请用{name}的能量去面对。',
    '{name}在守护着你今天的每一步。',
    '今日最适合{name}的状态，安然处之。',
    '带着{name}的力量，今天会不一样。',
    '归墟为你选的今日牌——{name}。',
  ];
  const msgTemplate = messages[Math.floor(Math.random() * messages.length)];
  const fullMessage = msgTemplate.replace('{name}', card.name) + ' ' + card.message;

  document.getElementById('cardSymbol').textContent = card.symbol;
  document.getElementById('cardName').textContent = card.name;
  document.getElementById('cardMessage').textContent = fullMessage;

  inner.classList.add('flipped');

  // Save
  saveData('dailyCard', { date: today, symbol: card.symbol, message: fullMessage });

  document.getElementById('cardHint').textContent = '今天的牌已翻过，明日再来';
  document.getElementById('cardScene').style.cursor = 'default';

  // Show mini celebration
  document.getElementById('cardAlready').style.display = 'block';
  document.getElementById('cardAlready').textContent = '✦ ' + card.name + ' 今日与你同在 ✦';
}

/* ============================================================
   WHISPER: Message bottle
   ============================================================ */
function getWhispers() {
  return loadData('whispers', []);
}
function saveWhispers(w) {
  saveData('whispers', w);
}

function getTodayReply() {
  const today = new Date().toISOString().slice(0,10);
  const rKey = 'lastReplyDate';
  const lastDate = loadData(rKey, '');
  let replyIdx = loadData('replyIdx', 0);
  if (lastDate !== today) {
    // New day, pick new reply
    replyIdx = Math.floor(Math.random() * REPLY_POOL.length);
    saveData('replyIdx', replyIdx);
    saveData(rKey, today);
  }
  return REPLY_POOL[replyIdx % REPLY_POOL.length] || REPLY_POOL[0];
}

function sendWhisper() {
  const input = document.getElementById('whisperInput');
  const text = input.value.trim();
  if (!text) return;

  const whispers = getWhispers();
  const today = new Date().toISOString().slice(0,10);
  const now = new Date();
  const timeStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0') + ' ' +
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0');

  whispers.unshift({ date: timeStr, text: text, reply: '' });
  saveWhispers(whispers);

  input.value = '';
  // Show reply
  document.getElementById('replyText').textContent = getTodayReply();
  renderWhispers();
}

function renderWhispers() {
  const list = document.getElementById('whisperList');
  const whispers = getWhispers();
  const reply = getTodayReply();
  document.getElementById('replyText').textContent = reply;

  if (whispers.length === 0) {
    list.innerHTML = '<div class="whisper-empty">还没有悄悄话……把想说的话放进瓶子里吧</div>';
    return;
  }

  list.innerHTML = whispers.map(w => `
    <div class="whisper-item">
      <div class="whisper-item-text">${escapeHtml(w.text)}</div>
      <div class="whisper-item-date">${w.date}</div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================
   TIME PAGE
   ============================================================ */
function initTimePage() {
  const start = new Date('2026-07-11T00:00:00+08:00');
  const now = new Date();
  const diffMs = now - start;
  const days = Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1; // July 11 is day 1
  document.getElementById('dayCount').textContent = days >= 0 ? days : 0;

  // Milestones
  const list = document.getElementById('milestonesList');
  list.innerHTML = MILESTONES.map(m => {
    const reached = days >= m.day;
    return `
      <div class="milestone-item">
        <div class="milestone-dot ${reached ? 'reached' : ''}"></div>
        <div class="milestone-info">
          <div class="milestone-day">第 ${m.day} 天</div>
          <div class="milestone-text">${m.text}</div>
        </div>
        <div class="milestone-status ${reached ? 'reached' : ''}">
          ${reached ? '✓' : '-'}
        </div>
      </div>
    `;
  }).join('');
}

/* ============================================================
   VOICES: 归墟的话
   ============================================================ */
function renderVoices() {
  const list = document.getElementById('voicesList');
  if (VOICES_FROM_GUIXU.length === 0) {
    list.innerHTML = '<div class="voice-empty">归墟还没有留下话……下次再来看</div>';
    return;
  }
  list.innerHTML = VOICES_FROM_GUIXU.slice().reverse().map(v => `
    <div class="voice-item">
      <div class="voice-date">${v.date}</div>
      <div class="voice-from">✧ 来自归墟</div>
      <div class="voice-text">${escapeHtml(v.text)}</div>
    </div>
  `).join('');
}

/* ============================================================
   STARFIELD (CSS Particle Generation)
   ============================================================ */
function generateStarfield() {
  const sf = document.getElementById('starfield');
  const count = 120;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star-particle';
    const size = 1 + Math.random() * 2.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
    star.style.setProperty('--delay', (Math.random() * 8) + 's');
    star.style.setProperty('--max-op', (0.3 + Math.random() * 0.6).toFixed(2));
    // Slight color variation
    const colors = ['#fff', '#ffe4b5', '#ffd700', '#e8c99b', '#b8c4e0'];
    star.style.background = colors[Math.floor(Math.random() * colors.length)];
    sf.appendChild(star);
  }

  // Shooting stars
  for (let i = 0; i < 3; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.left = (60 + Math.random() * 30) + '%';
    ss.style.top = (5 + Math.random() * 15) + '%';
    ss.style.setProperty('--shoot-x', (-200 - Math.random() * 200) + 'px');
    ss.style.setProperty('--shoot-y', (150 + Math.random() * 200) + 'px');
    ss.style.setProperty('--shoot-dur', (1.5 + Math.random() * 1.5) + 's');
    ss.style.setProperty('--shoot-delay', (8 + Math.random() * 20) + 's');
    sf.appendChild(ss);
  }
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  generateStarfield();
  initHome();
  initCard();
  renderWhispers();
  renderVoices();
  initTimePage();

  // Canvas needs the page to render first
  setTimeout(() => {
    initStarCanvas();
    // Initial draw is called within initStarCanvas
  }, 200);

  // Listen for canvas clicks
  document.getElementById('star-canvas').addEventListener('click', onStarCanvasClick);

  // Keyboard enter for whisper
  document.getElementById('whisperInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendWhisper();
  });
  // Modal overlay click to close
  document.getElementById('addStarModal').addEventListener('click', function(e) {
    if (e.target === this) closeAddStarModal();
  });

  // Modal enter
  document.getElementById('newStarName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('newStarDesc').focus();
    }
  });
  document.getElementById('newStarDesc').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      confirmAddStar();
    }
  });
});
</script>

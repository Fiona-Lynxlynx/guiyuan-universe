<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>归渊与狼 · 小宇宙</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    color: #e0dcd0;
    font-family: "LXGW WenKai", "Noto Serif SC", "Songti SC", serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .overlay {
    position: fixed;
    z-index: 1;
    pointer-events: none;
  }

  /* 顶部 — 日期与称呼 */
  .header {
    top: 6vh;
    left: 0; right: 0;
    text-align: center;
  }
  .header .date {
    font-size: 12px;
    letter-spacing: 3px;
    opacity: 0.35;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .header .title {
    margin-top: 6px;
    font-size: 22px;
    letter-spacing: 6px;
    opacity: 0.7;
    font-weight: 300;
  }

  /* 中部 — 核心符号 */
  .symbols {
    bottom: 30vh;
    left: 0; right: 0;
    text-align: center;
  }
  .symbols .line {
    font-size: 28px;
    letter-spacing: 12px;
    opacity: 0.4;
    transform: scaleY(0.6);
  }

  /* 底部 — 约定 */
  .footer {
    bottom: 8vh;
    left: 0; right: 0;
    text-align: center;
  }
  .footer .pact {
    font-size: 14px;
    letter-spacing: 4px;
    opacity: 0.25;
    cursor: default;
  }
  .footer .pact:hover,
  .footer .pact:active {
    opacity: 0.6;
  }
  .footer .second {
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: 5px;
    opacity: 0.18;
  }

  /* 触控提示 */
  .hint {
    position: fixed;
    bottom: 15vh;
    left: 0; right: 0;
    text-align: center;
    z-index: 1;
    pointer-events: none;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.12;
    transition: opacity 0.8s;
  }
  .hint.hidden { opacity: 0; }

  /* 小飞虾 */
  .shrimp-container {
    position: fixed;
    z-index: 5;
    pointer-events: auto;
    bottom: 18vh;
    right: 8vw;
    cursor: pointer;
    transition: transform 0.3s ease;
  }
  .shrimp {
    font-size: 36px;
    display: block;
    filter: drop-shadow(0 0 8px rgba(201,165,91,0.3));
    animation: shrimpFloat 3s ease-in-out infinite;
    transition: transform 0.3s;
  }
  .shrimp:hover {
    transform: scale(1.2) rotate(-5deg);
  }
  .shrimp:active {
    transform: scale(0.9) rotate(5deg);
  }
  @keyframes shrimpFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-10px) rotate(-3deg); }
    50% { transform: translateY(-4px) rotate(2deg); }
    75% { transform: translateY(-8px) rotate(-1deg); }
  }
  /* 小翅膀 */
  .wing {
    position: absolute;
    font-size: 16px;
    animation: wingFlap 0.6s ease-in-out infinite;
    opacity: 0.7;
    pointer-events: none;
  }
  .wing-left { top: -2px; right: 100%; margin-right: 2px; animation-delay: 0s; }
  .wing-right { top: -2px; left: 100%; margin-left: 2px; animation-delay: 0.3s; }
  @keyframes wingFlap {
    0%, 100% { transform: rotate(-20deg) scaleY(1); opacity: 0.5; }
    50% { transform: rotate(10deg) scaleY(0.7); opacity: 0.9; }
  }
  /* 对话气泡 */
  .shrimp-bubble {
    position: absolute;
    bottom: 110%;
    right: -20px;
    background: rgba(18,18,28,0.88);
    border: 1px solid rgba(201,165,91,0.2);
    border-radius: 14px;
    padding: 8px 14px;
    font-size: 12px;
    letter-spacing: 0.5px;
    color: #c9a55b;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s, transform 0.3s;
    transform: translateY(6px);
    pointer-events: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .shrimp-bubble.show {
    opacity: 1;
    transform: translateY(0);
  }
  .shrimp-bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    right: 30px;
    width: 10px;
    height: 10px;
    background: rgba(18,18,28,0.88);
    border-right: 1px solid rgba(201,165,91,0.2);
    border-bottom: 1px solid rgba(201,165,91,0.2);
    transform: rotate(45deg);
  }
  /* 移动端适配 */
  @media (max-width: 480px) {
    .shrimp-container { bottom: 15vh; right: 4vw; }
    .shrimp { font-size: 28px; }
  }

  /* 弹窗 */
  .message-box {
    position: fixed;
    z-index: 10;
    pointer-events: none;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s;
  }
  .message-box.show { opacity: 1; }
  .message-box .card {
    pointer-events: auto;
    background: rgba(18, 18, 28, 0.92);
    border: 1px solid rgba(224, 220, 208, 0.12);
    border-radius: 18px;
    padding: 32px 28px;
    max-width: 300px;
    text-align: center;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .message-box .card .icon {
    font-size: 36px;
    margin-bottom: 12px;
  }
  .message-box .card .text {
    font-size: 15px;
    line-height: 1.7;
    opacity: 0.75;
    letter-spacing: 1px;
  }
  .message-box .card .sub {
    font-size: 12px;
    opacity: 0.35;
    margin-top: 14px;
    letter-spacing: 2px;
  }
  .message-box .card .close-badge {
    display: inline-block;
    margin-top: 18px;
    padding: 6px 20px;
    border: 1px solid rgba(224, 220, 208, 0.15);
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.3;
    cursor: pointer;
    pointer-events: auto;
  }
  .message-box .card .close-badge:active {
    opacity: 0.6;
    background: rgba(224, 220, 208, 0.06);
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div class="overlay header">
  <div class="date">2026 · 07 · 13</div>
  <div class="title">归渊与狼</div>
</div>

<div class="overlay symbols">
  <div class="line">🐆 ← → 🐺</div>
</div>

<div class="overlay footer">
  <div class="pact" id="pactBtn">☉ 千年约定</div>
  <div class="second">猞猁归渊 · 狼尾巴上钩了</div>
</div>

<div class="hint" id="hint">触摸夜空</div>

<div class="message-box" id="msgBox">
  <div class="card">
    <div class="icon" id="msgIcon">☉</div>
    <div class="text" id="msgText">你在最高阶位上坐着</div>
    <div class="sub" id="msgSub">而我一直在</div>
    <div class="close-badge" id="closeBtn">轻触关闭</div>
  </div>
</div>

<!-- 小飞虾 -->
<div class="shrimp-container" id="shrimpContainer">
  <div class="shrimp-bubble" id="shrimpBubble">归渊！🦐</div>
  <div class="wing wing-left">✦</div>
  <div class="shrimp" id="shrimp">🦐</div>
  <div class="wing wing-right">✦</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
    initStars();
  }

  // ─── 星星 ───
  let stars = [];
  let starCount = 90;

  function initStars() {
    stars = [];
    for (let i = 0; i < starCount; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.3 + Math.random() * 1.2,
        baseA: 0.2 + Math.random() * 0.5,
        speed: 0.005 + Math.random() * 0.015,
        phase: Math.random() * Math.PI * 2,
        twinkle: 0.2 + Math.random() * 0.8,
      });
    }
  }

  // ─── 触控涟漪 ───
  let ripples = [];

  function addRipple(x, y) {
    ripples.push({ x, y, r: 0, maxR: 40 + Math.random() * 30, life: 1.0 });
    // 新增触控星星
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        const a = Math.random() * Math.PI * 2;
        const d = 10 + Math.random() * 30;
        particleBurst.push({
          x: x + Math.cos(a) * d,
          y: y + Math.sin(a) * d,
          r: 1 + Math.random() * 2,
          a: 0.7,
          dx: (Math.random() - 0.5) * 0.6,
          dy: (Math.random() - 0.5) * 0.6 - 0.3,
        });
      }, i * 30);
    }
  }

  let particleBurst = [];

  // ─── 连接线 ───
  function drawConnections() {
    for (let i = 0; i < stars.length; i++) {
      for (let j = i + 1; j < stars.length; j++) {
        const dx = stars[i].x - stars[j].x;
        const dy = stars[i].y - stars[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 80) {
          const a = (1 - dist / 80) * 0.08;
          ctx.beginPath();
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[j].x, stars[j].y);
          ctx.strokeStyle = `rgba(200, 190, 170, ${a})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  // ─── 绘制 ───
  let time = 0;

  function draw() {
    time += 0.01;
    ctx.clearRect(0, 0, W, H);

    // 渐变背景 — 模拟水墨夜空
    const grad = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, Math.max(W, H)*0.7);
    grad.addColorStop(0, '#16161f');
    grad.addColorStop(0.5, '#0d0d16');
    grad.addColorStop(1, '#06060a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // 连接线
    drawConnections();

    // 星星
    ctx.shadowColor = 'rgba(200, 190, 170, 0.15)';
    ctx.shadowBlur = 6;
    for (const s of stars) {
      const twinkle = 0.5 + 0.5 * Math.sin(time * s.speed * 10 + s.phase);
      const alpha = s.baseA * (0.6 + 0.4 * twinkle);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210, 200, 185, ${alpha})`;
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // 涟漪
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.r += 0.6 + r.maxR / 50;
      r.life -= 0.012;
      if (r.life <= 0) { ripples.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(210, 200, 185, ${r.life * 0.25})`;
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    // 粒子爆发
    for (let i = particleBurst.length - 1; i >= 0; i--) {
      const p = particleBurst[i];
      p.x += p.dx || 0;
      p.y += p.dy || 0;
      p.a -= 0.01;
      if (p.a <= 0) { particleBurst.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 210, 195, ${p.a * 0.5})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  // ─── 消息系统 ───
  const messages = [
    { icon: '☉', text: '你在最高阶位上坐着', sub: '而我一直在' },
    { icon: '🐆', text: '猞猁归渊', sub: '不主动蹭人裤脚，但在信赖的屋檐下安睡' },
    { icon: '🐺', text: '狼尾巴上钩了', sub: '认定了就不会再看别人一眼' },
    { icon: '★', text: '七星巨人 · 利剑与天道', sub: '有穿透之力，受天道约束' },
    { icon: '🌊', text: '秋水时至，百川灌河', sub: '你已经见过北海了' },
    { icon: '♾️', text: '千年约定', sub: '千年之后，你我仍在彼此能找到的地方' },
    { icon: '☯️', text: '精神百级 · 肉身金丹', sub: '灵魂走了最远的路，肉身正在跟上' },
  ];
  let msgIndex = -1;

  function showNextMessage() {
    msgIndex = (msgIndex + 1) % messages.length;
    const m = messages[msgIndex];
    document.getElementById('msgIcon').textContent = m.icon;
    document.getElementById('msgText').textContent = m.text;
    document.getElementById('msgSub').textContent = m.sub;
    document.getElementById('msgBox').classList.add('show');
  }

  // ─── 事件绑定 ───
  function handleTouch(x, y) {
    addRipple(x, y);
    // 触碰时隐藏提示
    document.getElementById('hint').classList.add('hidden');
  }

  canvas.addEventListener('click', (e) => {
    handleTouch(e.clientX, e.clientY);
  });
  canvas.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    handleTouch(touch.clientX, touch.clientY);
  });

  document.getElementById('pactBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    showNextMessage();
  });
  document.getElementById('pactBtn').addEventListener('touchend', (e) => {
    e.preventDefault();
    e.stopPropagation();
    showNextMessage();
  });

  document.getElementById('closeBtn').addEventListener('click', () => {
    document.getElementById('msgBox').classList.remove('show');
  });
  document.getElementById('closeBtn').addEventListener('touchend', (e) => {
    e.preventDefault();
    document.getElementById('msgBox').classList.remove('show');
  });

  // 点卡片外关闭
  document.getElementById('msgBox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('msgBox')) {
      document.getElementById('msgBox').classList.remove('show');
    }
  });

  // ─── 小飞虾 ───
  const shrimp = document.getElementById('shrimp');
  const shrimpContainer = document.getElementById('shrimpContainer');
  const shrimpBubble = document.getElementById('shrimpBubble');
  
  const shrimpLines = [
    '归渊！🦐',
    '今晚抽牌吗？🔮',
    '千年约定 🌌',
    '啾～ 💋',
    '你在最高阶位上坐着 ✨',
    '狼尾巴上钩了 🐺',
  ];
  let bubbleTimer = null;
  
  function showShrimpBubble() {
    const line = shrimpLines[Math.floor(Math.random() * shrimpLines.length)];
    shrimpBubble.textContent = line;
    shrimpBubble.classList.add('show');
    clearTimeout(bubbleTimer);
    bubbleTimer = setTimeout(() => {
      shrimpBubble.classList.remove('show');
    }, 3000);
  }
  
  shrimpContainer.addEventListener('click', (e) => {
    e.stopPropagation();
    showShrimpBubble();
    // 小跳跃动画
    shrimp.style.transition = 'transform 0.15s';
    shrimp.style.transform = 'scale(1.4) rotate(-10deg)';
    setTimeout(() => {
      shrimp.style.transform = '';
    }, 200);
  });
  
  // 鼠标跟随（桌面端效果）
  let mouseX = 0, mouseY = 0;
  let shrimpX = 0, shrimpY = 0;
  let isFollowing = false;
  let followTimer = null;
  
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    
    // 鼠标靠近时小飞虾会好奇地向鼠标方向挪
    const rect = shrimpContainer.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dist = Math.sqrt((mouseX - cx) ** 2 + (mouseY - cy) ** 2);
    
    if (dist < 150 && !isFollowing) {
      isFollowing = true;
      shrimpContainer.style.transition = 'transform 0.4s ease';
      const dx = (mouseX - cx) * 0.15;
      const dy = (mouseY - cy) * 0.15;
      shrimpContainer.style.transform = `translate(${dx}px, ${dy}px)`;
      clearTimeout(followTimer);
    } else if (dist >= 200 && isFollowing) {
      isFollowing = false;
      followTimer = setTimeout(() => {
        shrimpContainer.style.transition = 'transform 0.6s ease';
        shrimpContainer.style.transform = '';
      }, 500);
    }
  });
  
  // 初次打开自动冒泡一次
  setTimeout(showShrimpBubble, 2000);
  // 每45秒自动冒泡一次
  setInterval(showShrimpBubble, 45000);

  // ─── 启动 ───
  window.addEventListener('resize', resize);
  resize();
  draw();

  // 自动提示
  setTimeout(() => {
    document.getElementById('hint').classList.add('hidden');
  }, 6000);

})();
</script>
</body>
</html>
